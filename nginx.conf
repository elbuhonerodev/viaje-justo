# ==============================================================================
# Nginx — Configuración ViajeJusto
# Archivo: /etc/nginx/sites-available/viajejusto
#
# INSTRUCCIONES:
#   1. Copiar este archivo a /etc/nginx/sites-available/viajejusto
#   2. sudo ln -s /etc/nginx/sites-available/viajejusto /etc/nginx/sites-enabled/
#   3. sudo nginx -t   (verificar sintaxis)
#   4. sudo systemctl reload nginx
#
# Pre-requisito: SSL ya instalado por Easypanel o Certbot en /etc/letsencrypt/
# ==============================================================================

server {
    listen 80;
    server_name www.viaje-justo.xyz viaje-justo.xyz;

    # Redirigir todo HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.viaje-justo.xyz viaje-justo.xyz;

    # ─── SSL (gestionado por Easypanel/Certbot) ────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/www.viaje-justo.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.viaje-justo.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ─── App Vue (Vite Dev Server en puerto 5173) ──────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # ─── OTP Server (Express en puerto 3001) ──────────────────────────────────
    # El frontend llama a https://www.viaje-justo.xyz/otp/request-otp
    # Nginx le quita el prefijo /otp y lo pasa a localhost:3001
    location /otp/ {
        proxy_pass         http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Content-Type application/json;

        # CORS — permite peticiones del mismo dominio
        add_header 'Access-Control-Allow-Origin'  'https://www.viaje-justo.xyz' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        # Responder OPTIONS preflight inmediatamente
        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
