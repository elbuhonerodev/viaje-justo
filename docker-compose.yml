version: '3.8'

services:
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    ports:
      - target: 8080
        published: 8080
        protocol: tcp
        mode: host
    environment:
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=21010479E3C5-4E3D-B751-3286CD2DA373
      - SERVER_URL=http://161.35.129.25:8080
      - DATABASE_ENABLED=true
      - DATABASE_CONNECTION_TYPE=postgres
      - DATABASE_CONNECTION_URI=postgresql://postgres:password@whatsapp_evolution-api-db:5432/evolution?sslmode=disable
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - CACHE_REDIS_ENABLED=false
    networks:
      - whatsapp_default

networks:
  whatsapp_default:
    external: true
